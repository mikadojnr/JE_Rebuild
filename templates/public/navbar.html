<!-- Navbar -->
<style>
    /* Default Mobile Size */
    .navbar-logo {
        height: 42px;
    }

    /* Small Tablets */
    @media (min-width: 640px) {
        .navbar-logo {
            height: 48px;
        }
    }

    /* Tablets / Small Laptops */
    @media (min-width: 768px) {
        .navbar-logo {
            height: 56px;
        }
    }

    /* Large Screens */
    @media (min-width: 1024px) {
        .navbar-logo {
            height: 64px;
        }
    }
</style>


<nav class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <!-- Main Navbar -->
        <div class="flex items-center justify-between h-16 md:h-20">

            <!-- Logo -->
            <a href="{{ url_for('public.home') }}" 
            class="flex items-center shrink-0">
                <img 
                    src="{{ site_settings.logo_image_path or '/static/images/logo.png' }}" 
                    alt="John & Eniola"
                    class="navbar-logo w-auto object-contain"
                >
            </a>
            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center gap-8">
                <a href="{{ url_for('public.home') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.home' else ''}}">
                    Home
                </a>

                <a href="{{ url_for('public.about') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.about' else ''}}">
                    About Us
                </a>

                <a href="{{ url_for('public.services') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.services' else ''}}">
                    Services
                </a>

                <a href="{{ url_for('public.insights') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.insights' or request.endpoint == 'public.blog_detail' else ''}}">
                    Insights
                </a>

                <a href="{{ url_for('public.newsletters') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.newsletters' or request.endpoint == 'public.newsletter_detail' else ''}}">
                    Newsletters
                </a>

                <a href="{{ url_for('public.contact') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.contact' else ''}}">
                    Contact Us
                </a>
            </div>

            <!-- Mobile Menu Button -->
            <button 
                id="mobile-menu-btn"
                onclick="toggleMobileMenu()"
                class="md:hidden inline-flex items-center justify-center w-10 h-10 rounded-lg border border-gray-200 text-gray-700 hover:bg-gray-100 transition"
                aria-label="Toggle menu"
            >
                <!-- Hamburger Icon -->
                <svg id="menu-open-icon" 
                     class="w-6 h-6 block" 
                     fill="none" 
                     stroke="currentColor" 
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" 
                          stroke-linejoin="round" 
                          stroke-width="2" 
                          d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>

                <!-- Close Icon -->
                <svg id="menu-close-icon" 
                     class="w-6 h-6 hidden" 
                     fill="none" 
                     stroke="currentColor" 
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" 
                          stroke-linejoin="round" 
                          stroke-width="2" 
                          d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <!-- Mobile Navigation -->
        <div id="mobile-menu" 
             class="hidden md:hidden overflow-hidden transition-all duration-300">
            
            <div class="py-3 border-t border-gray-100 space-y-1">

                <a href="{{ url_for('public.home') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.home' else ''}}">
                    Home
                </a>

                <a href="{{ url_for('public.about') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.about' else ''}}">
                    About Us
                </a>

                <a href="{{ url_for('public.services') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.services' else ''}}">
                    Services
                </a>

                <a href="{{ url_for('public.insights') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.insights' or request.endpoint == 'public.blog_detail' else ''}}">
                    Insights
                </a>

                <a href="{{ url_for('public.newsletters') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.newsletters' or request.endpoint == 'public.newsletter_detail' else ''}}">
                    Newsletters
                </a>

                <a href="{{ url_for('public.contact') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.contact' else ''}}">
                    Contact Us
                </a>

            </div>
        </div>

    </div>
</nav>

<script>
    function toggleMobileMenu() {
        const menu = document.getElementById('mobile-menu');
        const openIcon = document.getElementById('menu-open-icon');
        const closeIcon = document.getElementById('menu-close-icon');

        menu.classList.toggle('hidden');

        openIcon.classList.toggle('hidden');
        closeIcon.classList.toggle('hidden');
    }
</script>
