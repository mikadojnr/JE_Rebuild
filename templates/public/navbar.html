<!-- Navbar -->
<style>
    /* Default Mobile Size */
    .navbar-logo {
        height: 42px;
    }

    /* Small Tablets */
    @media (min-width: 640px) {
        .navbar-logo {
            height: 48px;
        }
    }

    /* Tablets / Small Laptops */
    @media (min-width: 768px) {
        .navbar-logo {
            height: 56px;
        }
    }

    /* Large Screens */
    @media (min-width: 1024px) {
        .navbar-logo {
            height: 64px;
        }
    }
</style>


<nav class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-gray-100 shadow-sm relative">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <!-- Main Navbar -->
        <div class="flex items-center justify-between h-16 md:h-20">

            <!-- Logo -->
            <a href="{{ url_for('public.home') }}" 
            class="flex items-center shrink-0">
                <img 
                    src="{{ site_settings.logo_image_path or '/static/images/logo.png' }}" 
                    alt="John & Eniola"
                    class="navbar-logo w-auto object-contain"
                >
            </a>
            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center gap-8">
                <a href="{{ url_for('public.home') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.home' else ''}}">
                    Home
                </a>

                <a href="{{ url_for('public.about') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.about' else ''}}">
                    About Us
                </a>

                <a href="{{ url_for('public.services') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.services' else ''}}">
                    Services
                </a>

                <a href="{{ url_for('public.insights') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.insights' or request.endpoint == 'public.blog_detail' else ''}}">
                    Insights
                </a>

                <a href="{{ url_for('public.newsletters') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.newsletters' or request.endpoint == 'public.newsletter_detail' else ''}}">
                    Newsletters
                </a>

                <a href="{{ url_for('public.contact') }}" 
                   class="text-gray-700 text-sm font-medium border-b-2 border-transparent pb-1 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.contact' else ''}}">
                    Contact Us
                </a>

                <!-- Search Icon -->
                <button onclick="toggleSearch()" class="text-gray-600 hover:text-[#141495] transition" aria-label="Search">
                    <i class="fa-solid fa-search text-lg"></i>
                </button>
            </div>

            <!-- Desktop Search Bar (hidden by default) -->
            <div id="desktop-search" class="hidden absolute left-0 right-0 top-full bg-white border-b border-gray-100 shadow-lg px-4 sm:px-6 lg:px-8 py-4">
                <form action="{{ url_for('public.search') }}" method="GET" class="max-w-3xl mx-auto flex gap-3">
                    <input type="text" name="q" placeholder="Search articles, services, newsletters..." 
                           class="flex-1 px-5 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#141495] focus:ring-2 focus:ring-[#141495]/10 text-sm"
                           autocomplete="off" required>
                    <button type="submit" class="px-6 py-3 bg-[#141495] text-white rounded-xl hover:bg-[#0f0f7a] transition text-sm font-medium">
                        <i class="fa-solid fa-search"></i>
                    </button>
                    <button type="button" onclick="toggleSearch()" class="px-4 py-3 text-gray-500 hover:text-gray-700 transition text-sm" aria-label="Close search">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </form>
            </div>

            <button 
                id="mobile-menu-btn"
                onclick="toggleMobileMenu()"
                class="md:hidden inline-flex items-center justify-center w-10 h-10 rounded-lg border border-gray-200 text-gray-700 hover:bg-gray-100 transition"
                aria-label="Toggle menu"
            >
                <!-- Hamburger Icon -->
                <svg id="menu-open-icon" 
                     class="w-6 h-6 block" 
                     fill="none" 
                     stroke="currentColor" 
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" 
                          stroke-linejoin="round" 
                          stroke-width="2" 
                          d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>

                <!-- Close Icon -->
                <svg id="menu-close-icon" 
                     class="w-6 h-6 hidden" 
                     fill="none" 
                     stroke="currentColor" 
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" 
                          stroke-linejoin="round" 
                          stroke-width="2" 
                          d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <!-- Mobile Search Icon (absolute below logo) -->
        <button onclick="toggleSearch()" class="md:hidden absolute left-4 top-full mt-1 text-gray-500 hover:text-[#141495] transition z-10" aria-label="Search">
            <i class="fa-solid fa-search text-lg"></i>
        </button>

        <!-- Mobile Navigation -->
        <div id="mobile-menu" 
             class="hidden md:hidden overflow-hidden transition-all duration-300">
            
            <div class="py-3 border-t border-gray-100 space-y-1">

                <a href="{{ url_for('public.home') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.home' else ''}}">
                    Home
                </a>

                <a href="{{ url_for('public.about') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.about' else ''}}">
                    About Us
                </a>

                <a href="{{ url_for('public.services') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.services' else ''}}">
                    Services
                </a>

                <a href="{{ url_for('public.insights') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.insights' or request.endpoint == 'public.blog_detail' else ''}}">
                    Insights
                </a>

                <a href="{{ url_for('public.newsletters') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.newsletters' or request.endpoint == 'public.newsletter_detail' else ''}}">
                    Newsletters
                </a>

                <a href="{{ url_for('public.contact') }}"
                   class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-300 ease-in-out hover:text-[#1E40AF] hover:border-[#1E40AF]
                   {{ 'text-[#0800f0]' if request.endpoint == 'public.contact' else ''}}">
                    Contact Us
                </a>

            </div>
        </div>

    </div>
</nav>

<script>
    function toggleMobileMenu() {
        const menu = document.getElementById('mobile-menu');
        const openIcon = document.getElementById('menu-open-icon');
        const closeIcon = document.getElementById('menu-close-icon');

        menu.classList.toggle('hidden');

        openIcon.classList.toggle('hidden');
        closeIcon.classList.toggle('hidden');
    }

    function toggleSearch() {
        const searchBar = document.getElementById('desktop-search');
        searchBar.classList.toggle('hidden');
        if (!searchBar.classList.contains('hidden')) {
            searchBar.querySelector('input').focus();
        }
    }

    // Close search on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const searchBar = document.getElementById('desktop-search');
            if (!searchBar.classList.contains('hidden')) {
                searchBar.classList.add('hidden');
            }
        }
    });
</script>
