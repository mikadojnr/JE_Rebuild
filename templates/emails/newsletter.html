{% extends "emails/email_base.html" %}

{% block title %}{{ subject }}{% endblock %}

{% block content %}
    {{ content | safe }}
    
    {% if google_drive_link or pdf_url %}
    <div style="margin: 35px 0; text-align: center;">
        <a href="{{ pdf_url or google_drive_link }}" 
           class="button" style="background:#141495; color:white; padding:16px 40px;">
            📄 Download Full PDF
        </a>
    </div>

    <a href="{{ url_for('public.unsubscribe', email=recipient_email|default(''), _external=True) }}" 
                   style="color: #64748b; text-decoration: underline;">
                    Unsubscribe
                </a>
    {% endif %}
{% endblock %}
